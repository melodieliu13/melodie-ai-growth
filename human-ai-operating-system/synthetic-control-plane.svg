<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Synthetic MelodieOS control plane</title>
  <desc id="desc">A fictional product interface showing direction, delegation, evidence gates and handoff. It contains no private MelodieOS data.</desc>
  <rect width="1200" height="620" fill="#eeece6"/>
  <rect x="28" y="24" width="1144" height="572" rx="24" fill="#f8f7f3" stroke="#c9c4b8"/>

  <text x="64" y="70" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#17263d">MelodieOS</text>
  <text x="64" y="97" font-family="Arial, sans-serif" font-size="14" fill="#657084">Human-led continuity layer for AI work</text>
  <rect x="944" y="52" width="182" height="34" rx="17" fill="#e7dcc4"/>
  <text x="1035" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#6e5524">SYNTHETIC DEMO</text>

  <rect x="64" y="126" width="1072" height="78" rx="14" fill="#17263d"/>
  <text x="88" y="154" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#d8bd7d">NORTH STAR · FICTIONAL SCENARIO</text>
  <text x="88" y="181" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#ffffff">Validate a new-market launch before scaling</text>
  <text x="815" y="161" font-family="Arial, sans-serif" font-size="12" fill="#b9c2cf">SUCCESS SIGNAL</text>
  <text x="815" y="183" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">10 qualified pilot users</text>

  <text x="64" y="241" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#657084">01 · DIRECTION</text>
  <rect x="64" y="254" width="330" height="132" rx="16" fill="#ffffff" stroke="#d7d2c7"/>
  <text x="86" y="282" font-family="Arial, sans-serif" font-size="12" fill="#7a8390">CURRENT DECISION</text>
  <text x="86" y="307" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#17263d">Test demand manually first</text>
  <line x1="86" y1="326" x2="370" y2="326" stroke="#e4e0d8"/>
  <text x="86" y="349" font-family="Arial, sans-serif" font-size="12" fill="#7a8390">BOUNDARY</text>
  <text x="86" y="371" font-family="Arial, sans-serif" font-size="14" fill="#26364d">No automation before repeated use</text>

  <text x="434" y="241" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#657084">02 · DELEGATION</text>
  <rect x="434" y="254" width="330" height="132" rx="16" fill="#ffffff" stroke="#d7d2c7"/>
  <circle cx="460" cy="286" r="7" fill="#5b8b70"/>
  <text x="478" y="291" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#17263d">Research agent</text>
  <text x="725" y="291" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5b8b70">DONE</text>
  <circle cx="460" cy="324" r="7" fill="#c79a3b"/>
  <text x="478" y="329" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#17263d">Experiment agent</text>
  <text x="725" y="329" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#9a6e16">ACTIVE</text>
  <circle cx="460" cy="362" r="7" fill="#a9afb8"/>
  <text x="478" y="367" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#17263d">Human review</text>
  <text x="725" y="367" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#657084">REQUIRED</text>

  <text x="804" y="241" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#657084">03 · EVIDENCE GATE</text>
  <rect x="804" y="254" width="332" height="132" rx="16" fill="#fffaf0" stroke="#d8bd7d"/>
  <rect x="826" y="274" width="65" height="28" rx="14" fill="#f0dca8"/>
  <text x="858" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#765817">HOLD</text>
  <text x="826" y="326" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#17263d">2 / 3 user signals observed</text>
  <text x="826" y="351" font-family="Arial, sans-serif" font-size="13" fill="#657084">Next proof: one voluntary return</text>
  <text x="826" y="371" font-family="Arial, sans-serif" font-size="13" fill="#657084">No growth claim before the gate passes</text>

  <text x="64" y="428" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#657084">04 · HANDOFF</text>
  <rect x="64" y="442" width="1072" height="82" rx="16" fill="#ffffff" stroke="#d7d2c7"/>
  <text x="88" y="469" font-family="Arial, sans-serif" font-size="12" fill="#7a8390">ACCEPTED</text>
  <text x="88" y="494" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#17263d">One audience, one offer</text>
  <line x1="360" y1="460" x2="360" y2="506" stroke="#e4e0d8"/>
  <text x="388" y="469" font-family="Arial, sans-serif" font-size="12" fill="#7a8390">REJECTED</text>
  <text x="388" y="494" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#17263d">Premature content factory</text>
  <line x1="690" y1="460" x2="690" y2="506" stroke="#e4e0d8"/>
  <text x="718" y="469" font-family="Arial, sans-serif" font-size="12" fill="#7a8390">NEXT OWNER + ACTION</text>
  <text x="718" y="494" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#17263d">Human · run three outreach tests</text>

  <text x="64" y="562" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#17263d">Sense → Decide → Delegate → Verify → Record → Resume</text>
  <text x="1136" y="562" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#7a8390">No private data · recreated interface · illustrative content</text>
</svg>
