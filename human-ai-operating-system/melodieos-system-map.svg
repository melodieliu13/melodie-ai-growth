<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">MelodieOS system map</title>
  <desc id="desc">Twelve project domains arranged in control, intelligence, execution, capability and capacity layers. P0 selects the active route around the current goal.</desc>
  <defs>
    <style>
      .title{font:700 32px Georgia,serif;fill:#152941}.sub{font:500 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#52657a}.layer{font:700 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:1.5px;fill:#6a788a}.name{font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#152941}.copy{font:400 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#506277}.tower{font:700 23px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#152941}.towercopy{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#506277}
    </style>
  </defs>
  <rect width="1440" height="900" rx="24" fill="#f4f6f8"/>
  <text x="60" y="55" class="title">P0–P11 · one portfolio, five management layers</text>
  <text x="60" y="84" class="sub">The projects do not run as a fixed pipeline. P0 selects the combination required by the current objective.</text>

  <text x="60" y="126" class="layer">CONTROL</text>
  <rect x="60" y="143" width="930" height="96" rx="18" fill="#fff4dd" stroke="#d2a24c" stroke-width="2"/>
  <text x="84" y="180" class="tower">P0 · Direction &amp; Portfolio Control</text>
  <text x="84" y="208" class="towercopy">Select the active route · cap priorities · reallocate after feedback</text>
  <rect x="1010" y="143" width="370" height="96" rx="18" fill="#eef1f5" stroke="#b6c1ce"/>
  <text x="1032" y="180" class="name">P10 · Resource Constraints</text>
  <text x="1032" y="208" class="copy">Runway · risk · option boundaries</text>

  <text x="60" y="284" class="layer">INTELLIGENCE · SUPPLIES JUDGMENT</text>
  <g transform="translate(60 301)"><rect width="426" height="102" rx="16" fill="#e7f4f1" stroke="#a5c9c1"/><text x="20" y="38" class="name">P1 · Knowledge &amp; Concepts</text><text x="20" y="67" class="copy">Plain-language understanding called by live projects</text></g>
  <g transform="translate(507 301)"><rect width="426" height="102" rx="16" fill="#e7f4f1" stroke="#a5c9c1"/><text x="20" y="38" class="name">P5 · Market Signals</text><text x="20" y="67" class="copy">Noise → changed judgment → falsifiable action</text></g>
  <g transform="translate(954 301)"><rect width="426" height="102" rx="16" fill="#e7f4f1" stroke="#a5c9c1"/><text x="20" y="38" class="name">P8 · Company &amp; Industry</text><text x="20" y="67" class="copy">History · technology · organizations · business</text></g>

  <text x="60" y="448" class="layer">EXECUTION · MOVES WORK INTO REALITY</text>
  <g transform="translate(60 465)"><rect width="315" height="118" rx="16" fill="#fff7e7" stroke="#d7ae65"/><text x="18" y="37" class="name">P2 · Career Market</text><text x="18" y="65" class="copy">Demand · applications</text><text x="18" y="88" class="copy">evidence gaps · feedback</text></g>
  <g transform="translate(395 465)"><rect width="315" height="118" rx="16" fill="#fff7e7" stroke="#d7ae65"/><text x="18" y="37" class="name">P4 · Partners</text><text x="18" y="65" class="copy">Real people · trust</text><text x="18" y="88" class="copy">outreach · commitments</text></g>
  <g transform="translate(730 465)"><rect width="315" height="118" rx="16" fill="#fff1d2" stroke="#c98f29" stroke-width="2"/><text x="18" y="37" class="name">P6 · Growth Experiments</text><text x="18" y="65" class="copy">Audience · channel · action</text><text x="18" y="88" class="copy">metric · stop condition</text></g>
  <g transform="translate(1065 465)"><rect width="315" height="118" rx="16" fill="#fff7e7" stroke="#d7ae65"/><text x="18" y="37" class="name">P7 · Communication</text><text x="18" y="65" class="copy">Judgment → interview</text><text x="18" y="88" class="copy">partner and English language</text></g>

  <text x="60" y="628" class="layer">CAPABILITY · BUILDS AND PROVES REUSABLE ABILITY</text>
  <g transform="translate(60 645)"><rect width="650" height="104" rx="16" fill="#e8eef5" stroke="#a9b9ca"/><text x="20" y="39" class="name">P3 · AI Capability &amp; Public Evidence</text><text x="20" y="69" class="copy">Historical proof · applied work · evidence gate · public portfolio</text></g>
  <g transform="translate(730 645)"><rect width="650" height="104" rx="16" fill="#e8eef5" stroke="#a9b9ca"/><text x="20" y="39" class="name">P11 · Management Learning</text><text x="20" y="69" class="copy">Courses and outside methods called as learning modules by real problems</text></g>

  <text x="60" y="794" class="layer">CAPACITY · SETS THE REALISTIC OPERATING LOAD</text>
  <rect x="60" y="811" width="1320" height="60" rx="16" fill="#e8f4eb" stroke="#a5c8ad"/>
  <text x="84" y="847" class="name">P9 · Sustainable Capacity</text>
  <text x="370" y="847" class="copy">Body signals · operating constraints · behavior · measurable change</text>
</svg>
